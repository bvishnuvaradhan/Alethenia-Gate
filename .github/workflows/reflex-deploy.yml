name: Deploy Reflex App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install reflex

      - name: Deploy to Reflex Cloud
        env:
          REFLEX_TOKEN: ${{ secrets.REFLEX_TOKEN }}
        run: |
          reflex deploy \
            --app-id 0b1b547a-4740-4b6f-8e55-a721cae9f3be \
            --token "$REFLEX_TOKEN" \
            --no-interactive
